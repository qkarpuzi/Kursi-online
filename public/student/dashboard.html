<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        nav { background: #2c3e50; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        nav h1 { color: white; }
        nav button { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .section { background: white; border-radius: 8px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 15px; }
        .card { border: 1px solid #eee; border-radius: 5px; padding: 15px; margin-top: 10px; }
        .card h3 { margin-bottom: 5px; }
        button { padding: 8px 15px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 8px; }
        .status { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 0.8em; }
        .pending { background: #f39c12; color: white; }
        .accepted { background: #27ae60; color: white; }
        .rejected { background: #e74c3c; color: white; }
        a { color: #2c3e50; }
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal.open { display: flex; }
        .modal-box { background: white; padding: 30px; border-radius: 8px; width: 500px; max-height: 80vh; overflow-y: auto; }
        .modal-box h3 { margin-bottom: 15px; }
        .question { margin-bottom: 15px; }
        .question p { margin-bottom: 8px; font-weight: bold; }
        .question label { display: block; margin-bottom: 4px; cursor: pointer; }
        .modal-box button { width: 100%; margin-top: 10px; padding: 10px; }
    </style>
</head>
<body>
    <nav>
        <h1>Student Dashboard</h1>
        <button onclick="logout()">Logout</button>
    </nav>
    <div class="container">
        <div class="section">
            <h2>My Enrolled Courses</h2>
            <div id="myCourses">Loading...</div>
        </div>
        <div class="section">
            <h2>All Available Courses</h2>
            <div id="allCourses">Loading...</div>
        </div>
    </div>

    <!-- Apply Modal -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <h3>Apply to Course</h3>
            <div id="questions"></div>
            <button onclick="submitApplication()">Submit Application</button>
            <button onclick="closeModal()" style="background:#999;margin-top:5px;">Cancel</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));
        let currentCourseId = null;

        if (!token || !user || user.role !== 'student') {
            window.location.href = '/login.html';
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        async function loadMyCourses() {
            const res = await fetch('/api/enrollments/mycourses', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const courses = await res.json();
            const container = document.getElementById('myCourses');
            if (!courses.length) { container.innerHTML = '<p>Not enrolled in any courses yet.</p>'; return; }
            container.innerHTML = courses.map(c => `
                <div class="card">
                    <h3>${c.title}</h3>
                    <p>${c.description || ''}</p>
                    <small>By ${c.professor_name}</small><br>
                    <a href="/student/course.html?id=${c.id}">View Course →</a>
                </div>
            `).join('');
        }

       async function loadAllCourses() {
    const [coursesRes, appsRes] = await Promise.all([
        fetch('/api/courses'),
        fetch('/api/enrollments/myapplications', { headers: { 'Authorization': 'Bearer ' + token } })
    ]);
    const courses = await coursesRes.json();
    const apps = await appsRes.json();
    const appMap = {};
    apps.forEach(a => appMap[a.course_id] = a.status);

    const container = document.getElementById('allCourses');
    if (!courses.length) { container.innerHTML = '<p>No courses available.</p>'; return; }
    container.innerHTML = courses.map(c => {
        const status = appMap[c.id];
        let action = `<button onclick="openModal(${c.id})">Apply</button>`;
        if (status === 'accepted') action = '<span style="color:green;">✓ Enrolled</span>';
        if (status === 'pending') action = '<span style="color:orange;">⏳ Pending review</span>';
        if (status === 'rejected') action = '<span style="color:red;">✗ Rejected</span>';
        return `
            <div class="card">
                <h3>${c.title}</h3>
                <p>${c.description || ''}</p>
                <small>By ${c.professor_name}</small><br>
                <div style="margin-top:8px;">${action}</div>
            </div>
        `;
    }).join('');
}

        async function openModal(courseId) {
            currentCourseId = courseId;
            const res = await fetch('/api/enrollments/questions');
            const questions = await res.json();
            document.getElementById('questions').innerHTML = questions.map(q => `
                <div class="question">
                    <p>${q.question_text}</p>
                    <label><input type="radio" name="q${q.id}" value="a"> ${q.option_a}</label>
                    <label><input type="radio" name="q${q.id}" value="b"> ${q.option_b}</label>
                    <label><input type="radio" name="q${q.id}" value="c"> ${q.option_c}</label>
                    ${q.option_d ? `<label><input type="radio" name="q${q.id}" value="d"> ${q.option_d}</label>` : ''}
                </div>
            `).join('');
            document.getElementById('modal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('open');
            currentCourseId = null;
        }

        async function submitApplication() {
            const res = await fetch('/api/enrollments/questions');
            const questions = await res.json();
            const answers = [];
            for (const q of questions) {
                const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
                if (!selected) { alert('Please answer all questions'); return; }
                answers.push({ question_id: q.id, selected_option: selected.value });
            }
            const r = await fetch(`/api/enrollments/apply/${currentCourseId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ answers })
            });
            const data = await r.json();
            alert(data.message);
            closeModal();
            loadMyCourses();
        }

        loadMyCourses();
        loadAllCourses();
    </script>
</body>
</html>
