<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Course Portal</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Home Button */
        .home-nav {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .home-link {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }
        .home-link:hover { color: var(--primary); }

        .box { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 420px; 
            border: 1px solid var(--border);
        }

        h2 { 
            margin-bottom: 8px; 
            text-align: center; 
            font-size: 1.75rem;
            color: var(--text-main);
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 18px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-family: inherit;
            background: #fcfcfd;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 1rem;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover { background: var(--primary-hover); }

        .msg { 
            text-align: center; 
            margin-top: 15px; 
            color: #dc2626; 
            font-size: 0.85rem;
            min-height: 1.2rem;
        }

        .footer-links {
            margin-top: 20px;
            text-align: center;
        }

        .footer-links a { 
            font-size: 0.9rem;
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 500;
        }
        .footer-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="home-nav">
        <a href="/" class="home-link">← Go Home</a>
    </div>

    <div class="box">
        <h2>Create Account</h2>
        <p class="subtitle">Join the portal to start learning</p>
        
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" />

        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="name@example.com" />
        
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" />
        
        <label for="role">I am a...</label>
        <select id="role">
            <option value="student">Student</option>
            <option value="professor">Professor</option>
        </select>

        <button onclick="register()">Create Account</button>
        
        <div class="msg" id="msg"></div>
        
        <div class="footer-links">
            <a href="/login.html">Already have an account? Login</a>
        </div>
    </div>

    <script>
        // Logic preserved exactly as per original
        async function register() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const msgElement = document.getElementById('msg');

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });
                const data = await res.json();
                
                if (res.ok) {
                    window.location.href = '/login.html';
                } else {
                    msgElement.textContent = data.message;
                }
            } catch (err) {
                msgElement.textContent = "Registration failed. Try again.";
            }
        }
    </script>
</body>
</html>
