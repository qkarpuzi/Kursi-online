<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Course</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        nav { background: #2c3e50; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        nav h1 { color: white; }
        nav a { color: white; text-decoration: none; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .section { background: white; border-radius: 8px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        .btn-green { background: #27ae60; }
        .btn-red { background: #e74c3c; }
        .card { border: 1px solid #eee; border-radius: 5px; padding: 15px; margin-top: 10px; }
        .card h4 { margin-bottom: 5px; }
        .answer { background: #f9f9f9; padding: 8px; margin-top: 5px; border-radius: 4px; font-size: 0.9em; }
        .msg { color: green; margin-top: 10px; }
        .status { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 0.8em; }
        .pending { background: #f39c12; color: white; }
        .accepted { background: #27ae60; color: white; }
        .rejected { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <nav>
        <h1 id="courseTitle">Course</h1>
        <a href="/professor/dashboard.html">← Back</a>
    </nav>
    <div class="container">

        <!-- Edit Course -->
        <div class="section">
            <h2>Edit Course</h2>
            <input type="text" id="editTitle" placeholder="Course Title" />
            <textarea id="editDesc" placeholder="Description" rows="3"></textarea>
            <button onclick="updateCourse()">Save Changes</button>
            <div class="msg" id="editMsg"></div>
        </div>

        <!-- Add Assignment -->
        <div class="section">
            <h2>Add Assignment</h2>
            <input type="text" id="aTitle" placeholder="Assignment Title" />
            <textarea id="aDesc" placeholder="Description" rows="3"></textarea>
            <input type="date" id="aDue" />
            <input type="file" id="aFile" />
            <button onclick="createAssignment()">Add Assignment</button>
            <div class="msg" id="assignMsg"></div>
        </div>

        <!-- Assignments -->
        <div class="section">
            <h2>Assignments</h2>
            <div id="assignments">Loading...</div>
        </div>

        <!-- Applications -->
        <div class="section">
            <h2>Enrollment Applications</h2>
            <div id="applications">Loading...</div>
        </div>

    </div>
    <script>
        const token = localStorage.getItem('token');
        const params = new URLSearchParams(window.location.search);
        const courseId = params.get('id');

        if (!token) window.location.href = '/login.html';

        async function loadCourse() {
            const res = await fetch('/api/courses');
            const courses = await res.json();
            const course = courses.find(c => c.id == courseId);
            if (course) {
                document.getElementById('courseTitle').textContent = course.title;
                document.getElementById('editTitle').value = course.title;
                document.getElementById('editDesc').value = course.description || '';
            }
        }

        async function updateCourse() {
            const title = document.getElementById('editTitle').value;
            const description = document.getElementById('editDesc').value;
            const res = await fetch(`/api/courses/${courseId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ title, description })
            });
            const data = await res.json();
            document.getElementById('editMsg').textContent = data.message;
        }

        async function loadAssignments() {
            const res = await fetch(`/api/assignments/${courseId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const assignments = await res.json();
            const container = document.getElementById('assignments');
            if (!assignments.length) { container.innerHTML = '<p>No assignments yet.</p>'; return; }
            container.innerHTML = assignments.map(a => `
                <div class="card">
                    <h4>${a.title}</h4>
                    <p>${a.description || ''}</p>
                    ${a.due_date ? `<small>Due: ${new Date(a.due_date).toLocaleDateString()}</small>` : ''}
                    <br><button onclick="loadSubmissions(${a.id}, this)" style="margin-top:10px;font-size:0.85em;padding:5px 10px;">View Submissions</button>
                    <div id="subs_${a.id}"></div>
                </div>
            `).join('');
        }

        async function loadSubmissions(assignmentId, btn) {
            const res = await fetch(`/api/assignments/submissions/${assignmentId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const subs = await res.json();
            const container = document.getElementById(`subs_${assignmentId}`);
            if (!subs.length) { container.innerHTML = '<p>No submissions yet.</p>'; return; }
            container.innerHTML = subs.map(s => `
                <div class="answer">
                    <strong>${s.student_name}</strong><br>
                    ${s.text_response ? `<p>${s.text_response}</p>` : ''}
                    ${s.file_url ? `<a href="${s.file_url}" target="_blank">View File</a>` : ''}
                </div>
            `).join('');
        }

        async function createAssignment() {
            const formData = new FormData();
            formData.append('title', document.getElementById('aTitle').value);
            formData.append('description', document.getElementById('aDesc').value);
            formData.append('due_date', document.getElementById('aDue').value);
            const file = document.getElementById('aFile').files[0];
            if (file) formData.append('file', file);

            const res = await fetch(`/api/assignments/${courseId}`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData
            });
            const data = await res.json();
            document.getElementById('assignMsg').textContent = data.message;
            if (res.ok) loadAssignments();
        }

        async function loadApplications() {
            const res = await fetch(`/api/enrollments/applications/${courseId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const apps = await res.json();
            const container = document.getElementById('applications');
            if (!apps.length) { container.innerHTML = '<p>No applications yet.</p>'; return; }
            container.innerHTML = apps.map(a => `
                <div class="card">
                    <h4>${a.student_name} <span class="status ${a.status}">${a.status}</span></h4>
                    <p>${a.student_email}</p>
                    ${a.answers.map(ans => `
                        <div class="answer"><strong>${ans.question_text}</strong><br>${ans.answer_text}</div>
                    `).join('')}
                    ${a.status === 'pending' ? `
                        <button class="btn-green" onclick="review(${a.application_id}, 'accepted')">Accept</button>
                        <button class="btn-red" onclick="review(${a.application_id}, 'rejected')">Reject</button>
                    ` : ''}
                </div>
            `).join('');
        }

        async function review(applicationId, status) {
            const res = await fetch(`/api/enrollments/review/${applicationId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ status })
            });
            if (res.ok) loadApplications();
        }

        loadCourse();
        loadAssignments();
        loadApplications();
    </script>
</body>
</html>
